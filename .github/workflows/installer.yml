name: Installer Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  installer-unix:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate installer happy path and timing
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_BIN="$RUNNER_TEMP/summon-source"
          TARGET_BIN="$RUNNER_TEMP/install-bin/summon"
          mkdir -p "$(dirname "$TARGET_BIN")"

          go build -o "$SOURCE_BIN" ./cmd/summon
          if command -v shasum >/dev/null 2>&1; then
            CHECKSUM="$(shasum -a 256 "$SOURCE_BIN" | awk '{print $1}')"
          else
            CHECKSUM="$(sha256sum "$SOURCE_BIN" | awk '{print $1}')"
          fi

          START="$(date +%s)"
          SUMMON_TEST_ALLOW_INSECURE_URLS=1 \
          SUMMON_DOWNLOAD_URL="file://$SOURCE_BIN" \
          SUMMON_CHECKSUM="$CHECKSUM" \
          SUMMON_INSTALL_PATH="$TARGET_BIN" \
          SUMMON_NO_MODIFY_PATH=1 \
          SUMMON_NONINTERACTIVE=1 \
          sh scripts/install.sh

          "$TARGET_BIN" --version

          END="$(date +%s)"
          DURATION="$((END - START))"
          test "$DURATION" -le 300

      - name: Validate installer checksum failure path
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_BIN="$RUNNER_TEMP/summon-source"
          TARGET_BIN="$RUNNER_TEMP/install-bin/summon"
          mkdir -p "$(dirname "$TARGET_BIN")"

          go build -o "$SOURCE_BIN" ./cmd/summon

           if SUMMON_TEST_ALLOW_INSECURE_URLS=1 \
             SUMMON_DOWNLOAD_URL="file://$SOURCE_BIN" \
             SUMMON_CHECKSUM="deadbeef" \
             SUMMON_INSTALL_PATH="$TARGET_BIN" \
             SUMMON_NO_MODIFY_PATH=1 \
             SUMMON_NONINTERACTIVE=1 \
             sh scripts/install.sh; then
            echo "expected checksum mismatch failure"
            exit 1
          fi

      - name: Validate unsupported platform guardrail
        shell: bash
        run: |
          set -euo pipefail

          if SUMMON_TEST_OS="plan9" \
             SUMMON_NO_MODIFY_PATH=1 \
             SUMMON_NONINTERACTIVE=1 \
             sh scripts/install.sh; then
            echo "expected unsupported platform failure"
            exit 1
          fi

  installer-windows:
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate installer happy path and timing
        shell: pwsh
        run: |
          $source = Join-Path $env:RUNNER_TEMP "summon-source.exe"
          $target = Join-Path $env:RUNNER_TEMP "install-bin\summon.exe"
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null

          go build -o $source ./cmd/summon
          $checksum = (Get-FileHash -Path $source -Algorithm SHA256).Hash.ToLowerInvariant()
          $sourceUri = [System.Uri]::new($source).AbsoluteUri

          $start = Get-Date
          $env:SUMMON_TEST_ALLOW_INSECURE_URLS = "1"
          $env:SUMMON_DOWNLOAD_URL = $sourceUri
          $env:SUMMON_CHECKSUM = $checksum
          $env:SUMMON_INSTALL_PATH = $target
          $env:SUMMON_NO_MODIFY_PATH = "1"
          $env:SUMMON_NONINTERACTIVE = "1"
          ./scripts/install.ps1

          & $target --version

          $duration = [int]((Get-Date) - $start).TotalSeconds
          if ($duration -gt 300) {
            throw "installer exceeded 300s threshold: $duration"
          }

      - name: Validate installer checksum failure path
        shell: pwsh
        run: |
          $source = Join-Path $env:RUNNER_TEMP "summon-source.exe"
          $target = Join-Path $env:RUNNER_TEMP "install-bin\summon.exe"
          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null

          go build -o $source ./cmd/summon
          $sourceUri = [System.Uri]::new($source).AbsoluteUri

          $env:SUMMON_TEST_ALLOW_INSECURE_URLS = "1"
          $env:SUMMON_DOWNLOAD_URL = $sourceUri
          $env:SUMMON_CHECKSUM = "deadbeef"
          $env:SUMMON_INSTALL_PATH = $target
          $env:SUMMON_NO_MODIFY_PATH = "1"
          $env:SUMMON_NONINTERACTIVE = "1"

          $failed = $false
          try {
            ./scripts/install.ps1
          } catch {
            $failed = $true
          }

          if (-not $failed) {
            throw "expected checksum mismatch failure"
          }

      - name: Validate unsupported platform guardrail
        shell: pwsh
        run: |
          $env:SUMMON_TEST_OS = "plan9"
          $env:SUMMON_NO_MODIFY_PATH = "1"
          $env:SUMMON_NONINTERACTIVE = "1"

          $failed = $false
          try {
            ./scripts/install.ps1
          } catch {
            $failed = $true
          }

          if (-not $failed) {
            throw "expected unsupported platform failure"
          }
